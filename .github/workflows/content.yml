name: Govment.org — Auto-generate satirical content

on:
  schedule:
    # Every Wednesday and Saturday at 10am UTC (6am Eastern)
    - cron: '0 10 * * 3,7'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-article:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ensure scripts directory exists
        run: mkdir -p scripts

      - name: Run Scout + Writer + Image + Index agents
        run: node scripts/generate-article.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit new article, image, and updated index to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-published: new Govment.org article"
          commit_user_name: "Govment Bot"
          commit_user_email: "bot@govment.org"
          file_pattern: "*.html *.png articles.json scripts/last-image-prompt.json scripts/balance-log.txt"

      - name: Purge GitHub Pages cache
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/worksmarter-rp/chatguess/pages/deployments
        continue-on-error: true
